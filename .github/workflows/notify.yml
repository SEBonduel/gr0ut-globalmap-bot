name: Notif batailles Carte Globale

on:
  schedule:
    # Toutes les 15 min entre 12h00 et 22h45 UTC.
    # (= env. 14h00 -> 00h45 heure de Paris en été, de quoi prévenir 1h
    #  avant tous les prime times du soir.)
    - cron: "*/10 13-22 * * *"
  workflow_dispatch: {}   # permet de lancer à la main depuis l'onglet Actions

# Nécessaire pour que l'action puisse committer state.json (anti-doublon).
permissions:
  contents: write

concurrency:
  group: globalmap-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          WG_APP_ID: ${{ secrets.WG_APP_ID }}
          WG_CLAN_ID: ${{ secrets.WG_CLAN_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Persist anti-doublon state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "globalmap-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notification state [skip ci]"
            git push
          fi
