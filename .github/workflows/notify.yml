name: Notif batailles Carte Globale

# ⚠️ Cron DÉSACTIVÉ : ce bot est remplacé par le Worker Cloudflare
# (gr0ut-globalmap-worker) dont le cron 5 min est fiable — GitHub Actions
# throttlait les runs planifiés à ~1/h. Conservé en dispatch manuel / secours.
on:
  workflow_dispatch: {}

# Nécessaire pour que l'action puisse committer state.json (anti-doublon).
permissions:
  contents: write

concurrency:
  group: globalmap-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          WG_APP_ID: ${{ secrets.WG_APP_ID }}
          WG_CLAN_ID: ${{ secrets.WG_CLAN_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Persist anti-doublon state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "globalmap-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notification state [skip ci]"
            git push
          fi
